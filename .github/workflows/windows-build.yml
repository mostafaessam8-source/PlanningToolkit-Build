name: Build Windows XLL

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\PlanningToolkit.sln -p:Platform=x64

      - name: Build
        run: dotnet build .\PlanningToolkit.sln --configuration Release -p:Platform=x64 --no-restore

      - name: Run tests
        run: dotnet run --project .\tests\PlanningToolkit.Tests\PlanningToolkit.Tests.csproj --configuration Release --no-build

      - name: Collect XLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts\windows -Force
          $root = "src\PlanningToolkit.Excel\bin\Release\net8.0-windows"
          $xll = Get-ChildItem $root -Recurse -Filter "*-packed.xll" | Select-Object -First 1
          if (-not $xll) {
            $xll = Get-ChildItem $root -Recurse -Filter "*.xll" |
              Where-Object { $_.Name -match "64" } |
              Select-Object -First 1
          }
          if (-not $xll) {
            throw "64-bit XLL was not generated."
          }
          Copy-Item $xll.FullName "artifacts\windows\PlanningToolkit-v0.1.0-x64.xll"

      - name: Upload Windows XLL
        uses: actions/upload-artifact@v4
              - name: Rebuild project folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            "src\PlanningToolkit.Core", `
            "src\PlanningToolkit.Infrastructure", `
            "src\PlanningToolkit.Excel", `
            "tests\PlanningToolkit.Tests", `
            "docs" | Out-Null

          $core = @(
            "AppSettings.cs",
            "DateParser.cs",
            "TextTransforms.cs",
            "PlanningToolkit.Core.csproj"
          )

          $infrastructure = @(
            "AppPaths.cs",
            "FileAppLogger.cs",
            "IAppLogger.cs",
            "ISettingsStore.cs",
            "JsonSettingsStore.cs",
            "PlanningToolkit.Infrastructure.csproj"
          )

          $excel = @(
            "AddIn.cs",
            "AppServices.cs",
            "ExcelApplicationState.cs",
            "ExcelOperationRunner.cs",
            "ExcelSelectionTools.cs",
            "PlanningRibbon.cs",
            "PromptDialog.cs",
            "RibbonActions.cs",
            "SettingsForm.cs",
            "PlanningToolkit.Excel.csproj"
          )

          $tests = @(
            "Program.cs",
            "PlanningToolkit.Tests.csproj"
          )

          $docs = @(
            "ROADMAP.md",
            "UserGuide.md",
            "VERIFICATION.md"
          )

          foreach ($file in $core) {
            Move-Item $file "src\PlanningToolkit.Core\$file" -Force
          }

          foreach ($file in $infrastructure) {
            Move-Item $file "src\PlanningToolkit.Infrastructure\$file" -Force
          }

          foreach ($file in $excel) {
            Move-Item $file "src\PlanningToolkit.Excel\$file" -Force
          }

          foreach ($file in $tests) {
            Move-Item $file "tests\PlanningToolkit.Tests\$file" -Force
          }

          foreach ($file in $docs) {
            Move-Item $file "docs\$file" -Force
          }
        with:
          name: PlanningToolkit-Windows-x64-v0.1.0
          path: artifacts/windows
