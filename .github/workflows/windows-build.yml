name: Build Windows XLL

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild project folders
        shell: pwsh
        run: |
          # NOTE: as of v0.7.0 the repository root already contains the final, current
          # source files directly (including ReportTheme.cs and XerReportExport.cs), so
          # this step no longer expands any PlanningToolkit-PhaseN-Patch.zip. If you still
          # keep old patch zips in the repo for history, leave them zipped -- expanding an
          # old patch here would silently overwrite the current themed files with stale ones.

          New-Item -ItemType Directory -Force -Path `
            "src\PlanningToolkit.Core", `
            "src\PlanningToolkit.Infrastructure", `
            "src\PlanningToolkit.Excel", `
            "tests\PlanningToolkit.Tests", `
            "docs" | Out-Null

          $groups = @{
            "src\PlanningToolkit.Core" = @("AppSettings.cs", "DateParser.cs", "TextTransforms.cs", "XerModels.cs", "XerParser.cs", "XerValidator.cs", "XerSerializer.cs", "XerEditService.cs", "XerRoundTripExporter.cs", "XerScheduleBuilder.cs", "XerScheduleComparer.cs", "XerProgressAnalyzer.cs", "PlanningToolkit.Core.csproj")
            "src\PlanningToolkit.Infrastructure" = @("AppPaths.cs", "FileAppLogger.cs", "IAppLogger.cs", "ISettingsStore.cs", "JsonSettingsStore.cs", "PlanningToolkit.Infrastructure.csproj")
            "src\PlanningToolkit.Excel" = @("AddIn.cs", "AppServices.cs", "ExcelApplicationState.cs", "ExcelOperationRunner.cs", "ExcelSelectionTools.cs", "XerExcelTools.cs", "XerExportTools.cs", "XerScheduleReport.cs", "XerComparisonReport.cs", "XerPmsReport.cs", "ReportTheme.cs", "XerReportExport.cs", "PlanningRibbon.cs", "PromptDialog.cs", "RibbonActions.cs", "SettingsForm.cs", "PlanningToolkit.Excel.csproj")
            "tests\PlanningToolkit.Tests" = @("Program.cs", "PlanningToolkit.Tests.csproj")
            "docs" = @("ROADMAP.md", "UserGuide.md", "VERIFICATION.md")
          }

          foreach ($destination in $groups.Keys) {
            foreach ($file in $groups[$destination]) {
              Move-Item $file "$destination\$file" -Force
            }
          }

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\PlanningToolkit.sln -p:Platform=x64

      - name: Build
        run: dotnet build .\PlanningToolkit.sln --configuration Release -p:Platform=x64 --no-restore

      - name: Run tests
        run: dotnet run --project .\tests\PlanningToolkit.Tests\PlanningToolkit.Tests.csproj --configuration Release --no-build

      - name: Collect XLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts\windows -Force | Out-Null
          $root = "src\PlanningToolkit.Excel\bin\x64\Release\net8.0-windows"
          $xll = Get-ChildItem $root -Recurse -Filter "*-packed.xll" | Select-Object -First 1
          if (-not $xll) {
            $xll = Get-ChildItem $root -Recurse -Filter "*.xll" |
              Where-Object { $_.Name -match "64" } |
              Select-Object -First 1
          }
          if (-not $xll) {
            throw "64-bit XLL was not generated."
          }
          Copy-Item $xll.FullName "artifacts\windows\PlanningToolkit-v0.7.0-x64.xll"

      - name: Upload Windows XLL
        uses: actions/upload-artifact@v4
        with:
          name: PlanningToolkit-Windows-x64-v0.7.0
          path: artifacts/windows
